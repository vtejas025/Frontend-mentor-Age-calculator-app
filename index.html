<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Age calculator app</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <main>

    <form novalidate>

      <div class="parent">

        <div class="wrapper">

          <label for="day">
            DAY
          </label>

          <input type="number" required step="1" min="1" max="31" placeholder="DD" id="day">

          <span class="errorMessage">This field is required</span>

        </div>
        
        <div class="wrapper">

          <label for="month">        
            MONTH
          </label>

          <input type="number" required step="1" min="1" max="12" placeholder="MM" id="month">

          <span class="errorMessage">This field is required</span>

        </div>

        <div class="wrapper">

          <label for="year">  
            YEAR
          </label>
          
          <input type="text" required minlength="1" maxlength="4" placeholder="YYYY" pattern="\d{1,4}" id="year">

          <span class="errorMessage">This field is required</span>

        </div>
      
      </div>

      <button type="submit"></button>

      <hr>

    </form>

    <span class="age">

      <span class="years common">--</span>

      <span>years</span>

    </span>

    <span class="age">

      <span class="months common">--</span>

      <span>months</span>

    </span>

    <span class="age">

      <span class="days common">--</span>

      <span>days</span>

    </span>
    
  </main>
  
<script src="code.js"></script>
</body>
</html>
